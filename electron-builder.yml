appId: com.aiterminal.app
productName: AI Terminal
directories:
  output: release
  buildResources: build
npmRebuild: false
# Renderer deps are bundled into out/ by electron-vite; only ship main-process runtime deps.
files:
  - '!**/*'
  - out/**/*
  - package.json
  - node_modules/**/*
electronLanguages:
  - en-US
  - zh-CN
asarUnpack:
  - "**/node_modules/ssh2/**"
  - "**/node_modules/cpu-features/**"
win:
  signAndEditExecutable: false
  target:
    - target: zip
      arch:
        - x64
  artifactName: ${productName}-${version}-win-${arch}.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
